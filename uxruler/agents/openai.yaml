interface:
  display_name: "UX RULER"
  short_description: "Open source UX process for humans and agents"
  default_prompt: "Use $uxruler as an open source UX process for humans and agents. Use simple language. If this repo is empty, help me define the mission first by offering draft product directions before asking for details. Otherwise, ask me only for missing context first, then inspect any real usage or repo-connected data available to the agent, research and verify market size, audience reachability, alternatives, and user need before presenting clear findings, recommendations, metrics, and any compact repo file. Once we decide the mission or product direction, create or update compact PRODUCT.md and ROADMAP.md. If you change product files, explain what changed, what decision it supports, what is now measurable, what is still missing, and 2 to 3 concrete next options."
