name: Artifact proposal
description: Propose an artifact for the open source UX process for humans and agents.
title: "[Artifact]: "
labels:
  - artifact
  - proposal
body:
  - type: textarea
    id: stage
    attributes:
      label: Which UX RULER stage does this support?
      description: Mission, audience, user, need, infrastructure, product, value, evaluation, or decision/measurement.
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: What decision does it improve?
      description: UX RULER artifacts should help teams or agents make evidence-backed product decisions.
    validations:
      required: true
  - type: textarea
    id: template
    attributes:
      label: Suggested template
      description: Add headings or starter fields if you have them.
    validations:
      required: false
