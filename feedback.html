    :root {
      --black: #000;
      --white: #fff;
      --ink-soft: #737373;
      --grid-line: rgba(0, 0, 0, 0.04);
      --grid-size: 4px;
      --heading-font: "Space Grotesk", "Fragment Mono", ui-monospace, monospace;
      --mono-font: "Fragment Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --small-line: 16px;
      --meta-line: 20px;
      --text-line: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      background: var(--white);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      color: var(--black);
      font-family: var(--mono-font);
      line-height: var(--text-line);
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .page {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      min-height: 100svh;
      place-items: center;
      padding: clamp(48px, 7vw, 96px) 24px;
    }

    .feedback-card {
      width: 100%;
      max-width: 840px;
      min-width: 0;
    }

    .feedback-head {
      display: grid;
      gap: 24px;
      min-width: 0;
      padding: clamp(28px, 4.2vw, 40px);
      background: var(--black);
      color: var(--white);
    }

    .feedback-brand {
      display: block;
      width: min(173px, 100%);
      height: 24px;
      overflow: hidden;
      text-decoration: none;
    }

    .feedback-brand img {
      display: block;
      width: 100%;
      height: 24px;
      object-fit: fill;
    }

    .kicker {
      margin: 0;
      font-size: 20px;
      line-height: var(--text-line);
      text-transform: uppercase;
    }

    h1 {
      max-width: 17em;
      margin: 0;
      overflow-wrap: anywhere;
      font-family: var(--heading-font);
      font-size: clamp(38px, 4vw, 48px);
      font-weight: 600;
      line-height: clamp(48px, 4.8vw, 56px);
      letter-spacing: 0;
    }

    .intro {
      max-width: 28em;
      margin: 0;
      overflow-wrap: anywhere;
      font-size: clamp(20px, 2.4vw, 28px);
      line-height: clamp(32px, 3.4vw, 40px);
    }

    .feedback-form,
    .feedback-success {
      min-width: 0;
      border: 3px solid var(--black);
      border-top: 0;
      background: rgba(255, 255, 255, 0.94);
      color: var(--black);
    }

    .feedback-fields {
      display: grid;
      gap: 26px;
      padding: clamp(28px, 4.2vw, 40px);
    }

    .feedback-fields[hidden],
    .feedback-success[hidden] {
      display: none;
    }

    .field {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .field span {
      font-size: 20px;
      line-height: var(--text-line);
      text-transform: uppercase;
    }

    textarea,
    input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 3px solid var(--black);
      border-radius: 0;
      background: var(--white);
      color: var(--black);
      outline: none;
    }

    textarea {
      min-height: 272px;
      padding: 28px;
      resize: vertical;
      font-size: clamp(20px, 2.2vw, 28px);
      line-height: 36px;
    }

    input {
      min-height: 88px;
      padding: 0 28px;
      font-size: clamp(20px, 2.2vw, 28px);
      line-height: 36px;
    }

    textarea::placeholder,
    input::placeholder {
      color: var(--ink-soft);
      opacity: 1;
    }

    textarea:focus-visible,
    input:focus-visible,
    .button:focus-visible,
    .copy-link:focus-visible {
      outline: 3px solid var(--black);
      outline-offset: 5px;
    }

    textarea[aria-invalid="true"] {
      box-shadow: inset 0 0 0 3px var(--black);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 96px;
      border: 3px solid var(--black);
      border-radius: 0;
      padding: 0 38px;
      background: var(--black);
      color: var(--white);
      cursor: pointer;
      font-size: 24px;
      font-weight: 600;
      line-height: var(--text-line);
      text-decoration: none;
    }

    .button.secondary {
      min-height: 56px;
      padding: 0 18px;
      background: var(--white);
      color: var(--black);
      font-size: 14px;
      font-weight: 400;
      line-height: var(--meta-line);
    }

    .status {
      flex: 1 1 16rem;
      min-width: 0;
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: var(--small-line);
      text-transform: uppercase;
    }

    .feedback-success {
      display: grid;
      gap: 22px;
      min-height: 420px;
      align-content: center;
      padding: clamp(28px, 4.2vw, 40px);
    }

    .success-mark {
      position: relative;
      display: grid;
      width: 72px;
      height: 72px;
      place-items: center;
      border: 3px solid var(--black);
      border-radius: 50%;
      background: var(--white);
    }

    .success-mark::before {
      content: "";
      width: 30px;
      height: 17px;
      border-bottom: 5px solid var(--black);
      border-left: 5px solid var(--black);
      transform: rotate(-45deg) translate(2px, -1px);
      transform-origin: center;
    }

    .feedback-success h2 {
      margin: 0;
      font-family: var(--heading-font);
      font-size: clamp(32px, 4vw, 44px);
      line-height: clamp(40px, 4.4vw, 52px);
    }

    .feedback-success p {
      max-width: 34rem;
      margin: 0;
      font-size: 18px;
      line-height: 28px;
    }

    .copy-link {
      position: fixed;
      right: 24px;
      top: 50%;
      z-index: 4;
      display: grid;
      width: 72px;
      height: 72px;
      place-items: center;
      border: 3px solid var(--black);
      border-radius: 50%;
      background: #303030;
      color: var(--white);
      cursor: pointer;
      box-shadow: inset 0 0 0 2px #666;
      transform: translateY(-50%);
    }

    .copy-link-icon {
      position: relative;
      display: block;
      width: 28px;
      height: 28px;
    }

    .copy-link-icon::before,
    .copy-link-icon::after {
      content: "";
      position: absolute;
      right: 0;
      width: 22px;
      height: 3px;
      background: currentColor;
    }

    .copy-link-icon::before {
      top: 6px;
      box-shadow: 0 8px 0 currentColor;
    }

    .copy-link-icon::after {
      bottom: 3px;
      width: 12px;
      height: 12px;
      border: 3px solid currentColor;
      border-radius: 50%;
      background: transparent;
      box-shadow: none;
      transform: translateX(-17px);
    }

    .copy-link-tooltip {
      position: absolute;
      right: calc(100% + 12px);
      top: 50%;
      display: none;
      width: max-content;
      max-width: 220px;
      border: 2px solid var(--black);
      padding: 8px 10px;
      background: var(--white);
      color: var(--black);
      font-size: 12px;
      line-height: var(--small-line);
      text-transform: uppercase;
      transform: translateY(-50%);
    }

    .copy-link:hover .copy-link-tooltip,
    .copy-link:focus-visible .copy-link-tooltip {
      display: block;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 760px) {
      .page {
        display: block;
        align-items: start;
        width: 100%;
        max-width: 100vw;
        overflow: hidden;
        padding: 28px 14px 96px;
      }

      .feedback-card {
        width: 100%;
        max-width: 100%;
      }

      .feedback-head,
      .feedback-fields,
      .feedback-success {
        padding: 22px;
      }

      .kicker,
      .field span {
        font-size: 16px;
        line-height: var(--meta-line);
      }

      h1 {
        font-size: clamp(30px, 9vw, 38px);
        line-height: 42px;
      }

      .intro {
        font-size: 18px;
        line-height: 28px;
      }

      textarea {
        min-height: 220px;
      }

      textarea,
      input {
        padding: 18px;
        font-size: 18px;
        line-height: 28px;
      }

      input {
        min-height: 68px;
      }

      .button {
        width: 100%;
        min-height: 72px;
        padding: 0 20px;
        font-size: 18px;
      }

      .button.secondary {
        width: auto;
        min-height: 48px;
        font-size: 12px;
      }

      .copy-link {
        top: 16px;
        right: 16px;
        bottom: auto;
        width: 52px;
        height: 52px;
        transform: none;
      }

      .copy-link-tooltip {
        top: calc(100% + 10px);
        right: 0;
        bottom: auto;
        transform: none;
      }
    }

<body>
  <main class="page">
    <section class="feedback-card" aria-labelledby="feedbackTitle">
      <div class="feedback-head">
        <a class="feedback-brand" href="index.html#about" aria-label="UX RULER">
          <img src="assets/logo.svg" alt="">
        </a>
        <p class="kicker">Feedback</p>
        <h1 id="feedbackTitle">Co powinniśmy poprawić?</h1>
        <p class="intro">Napisz, co w UX RULER jest niejasne, brakujące albo warte poprawienia jako pierwsze.</p>
      </div>

      <form class="feedback-form" data-feedback-form novalidate>
        <div class="feedback-fields">
          <label class="field">
            <span>Twój feedback</span>
            <textarea data-feedback-message placeholder="Jedno zdanie wystarczy..." rows="6" required></textarea>
          </label>
          <label class="field">
            <span>Email do kontaktu (opcjonalnie)</span>
            <input type="email" data-feedback-email placeholder="email@example.com">
          </label>
          <div class="actions">
            <button class="button" type="submit">Wyślij feedback</button>
            <p class="status" data-feedback-status aria-live="polite"></p>
          </div>
        </div>
      </form>

      <div class="feedback-success" data-feedback-success hidden>
        <span class="success-mark" aria-hidden="true"></span>
        <h2>Feedback wysłany</h2>
        <p>Dzięki. To pomoże zdecydować, co w UX RULER poprawić albo przetestować jako następne.</p>
        <div class="actions">
          <button class="button secondary" type="button" data-feedback-new>Wyślij kolejny feedback</button>
          <a class="button secondary" href="index.html">Wróć na stronę główną</a>
        </div>
      </div>
    </section>
  </main>

  <button class="copy-link" type="button" data-copy-link>
    <span class="copy-link-icon" aria-hidden="true"></span>
    <span class="copy-link-tooltip" data-copy-link-tooltip>Kopiuj link</span>
    <span class="visually-hidden">Kopiuj link do ankiety</span>
  </button>

  <script>
    const feedbackSurface = "dedicated_page";
    const requiredMessage = "Dodaj krótki feedback przed wysłaniem.";
    const sentMessage = "Dzięki. Feedback wysłany.";
    const copyIdle = "Kopiuj link";
    const copyDone = "Link skopiowany";
    const copyFallback = "Zaznacz adres w pasku";
    const feedbackSurvey = {
      id: "019dfcac-4e80-0000-546a-8647548e2977",
      questions: [
        {
          id: "8bc0dd5a-bedd-450c-adc7-0711c5ec2859",
          type: "open",
          question: "Co powinniśmy poprawić?"
        },
        {
          id: "0bf2985e-6400-42b3-92a3-1d9271af83f4",
          type: "open",
          question: "E-mail do kontaktu"
        }
      ]
    };

    function feedbackSource() {
      const params = new URLSearchParams(window.location.search);
      return params.get("source") || params.get("utm_source") || "";
    }

    function trackFeedbackEvent(eventName, properties = {}) {
      const event = {
        event: eventName,
        language: document.documentElement.lang || "pl",
        path: window.location.pathname || "/feedback.html",
        feedback_surface: feedbackSurface,
        source: feedbackSource(),
        ...properties
      };
      const { event: _eventName, ...eventProperties } = event;

      if (!Array.isArray(window.dataLayer)) {
        window.dataLayer = [];
      }
      window.dataLayer.push(event);

      if (!Array.isArray(window.uxrulerFeedbackEvents)) {
        window.uxrulerFeedbackEvents = [];
      }
      window.uxrulerFeedbackEvents.push(event);

      if (typeof CustomEvent === "function") {
        window.dispatchEvent(new CustomEvent("uxruler:feedback-event", { detail: event }));
      }

      if (window.posthog && typeof window.posthog.capture === "function") {
        window.posthog.capture(eventName, eventProperties);
      }
    }

    function feedbackSurveyProperties(feedback, email, properties = {}) {
      const cleanFeedback = feedback.trim();
      const cleanEmail = email.trim();
      const [feedbackQuestion, emailQuestion] = feedbackSurvey.questions;

      return {
        ...properties,
        $survey_id: feedbackSurvey.id,
        $survey_questions: feedbackSurvey.questions.map((question) => ({
          id: question.id,
          question: question.question,
          type: question.type
        })),
        $survey_response: cleanFeedback,
        $survey_response_1: cleanEmail,
        [`$survey_response_${feedbackQuestion.id}`]: cleanFeedback,
        [`$survey_response_${emailQuestion.id}`]: cleanEmail
      };
    }

    function fallbackCopy(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.setAttribute("readonly", "");
      textArea.style.position = "fixed";
      textArea.style.top = "-9999px";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      let copied = false;
      try {
        copied = document.execCommand("copy");
      } finally {
        textArea.remove();
      }
      return copied;
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext && window.location.protocol !== "file:") {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch {
          return fallbackCopy(text);
        }
      }

      return fallbackCopy(text);
    }

    function shareUrl() {
      return window.location.protocol === "file:"
        ? "https://uxruler.com/feedback.html"
        : window.location.href;
    }

    function setStatus(message) {
      const status = document.querySelector("[data-feedback-status]");
      if (status) status.textContent = message;
    }

    function showSuccess() {
      const form = document.querySelector("[data-feedback-form]");
      const success = document.querySelector("[data-feedback-success]");
      if (form) form.hidden = true;
      if (success) success.hidden = false;

      const nextButton = document.querySelector("[data-feedback-new]");
      if (nextButton) nextButton.focus();
    }

    function resetFeedback() {
      const form = document.querySelector("[data-feedback-form]");
      const success = document.querySelector("[data-feedback-success]");
      const message = document.querySelector("[data-feedback-message]");

      if (form) {
        form.hidden = false;
        if (typeof form.reset === "function") form.reset();
      }
      if (success) success.hidden = true;
      if (message) {
        message.removeAttribute("aria-invalid");
        message.focus();
      }
      setStatus("");
    }

    const form = document.querySelector("[data-feedback-form]");
    if (form) {
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const message = document.querySelector("[data-feedback-message]");
        const email = document.querySelector("[data-feedback-email]");
        const cleanFeedback = message ? message.value.trim() : "";
        const cleanEmail = email ? email.value.trim() : "";

        if (!cleanFeedback) {
          if (message) {
            message.setAttribute("aria-invalid", "true");
            message.focus();
          }
          setStatus(requiredMessage);
          return;
        }

        if (message) message.removeAttribute("aria-invalid");

        const eventProperties = {
          feedback_length: cleanFeedback.length,
          has_contact_email: Boolean(cleanEmail)
        };
        if (cleanFeedback) eventProperties.feedback = cleanFeedback;
        if (cleanEmail) eventProperties.contact_email = cleanEmail;

        trackFeedbackEvent("feedback_page_sent", eventProperties);
        trackFeedbackEvent("survey sent", feedbackSurveyProperties(cleanFeedback, cleanEmail, {
          survey_stage: "feedback",
          survey_trigger: "dedicated_feedback_form"
        }));
        setStatus(sentMessage);
        if (typeof form.reset === "function") form.reset();
        showSuccess();
      });
    }

    const newFeedbackButton = document.querySelector("[data-feedback-new]");
    if (newFeedbackButton) {
      newFeedbackButton.addEventListener("click", resetFeedback);
    }

    const feedbackMessage = document.querySelector("[data-feedback-message]");
    if (feedbackMessage) {
      feedbackMessage.addEventListener("input", () => {
        feedbackMessage.removeAttribute("aria-invalid");
        setStatus("");
      });
    }

    const copyLinkButton = document.querySelector("[data-copy-link]");
    if (copyLinkButton) {
      copyLinkButton.addEventListener("click", async () => {
        const tooltip = document.querySelector("[data-copy-link-tooltip]");
        const copied = await copyText(shareUrl());
        if (tooltip) tooltip.textContent = copied ? copyDone : copyFallback;
        trackFeedbackEvent("feedback_page_link_copied", {
          copied
        });
        window.setTimeout(() => {
          if (tooltip) tooltip.textContent = copyIdle;
        }, 1600);
      });
    }

    trackFeedbackEvent("feedback_page_viewed", {
      referrer: document.referrer || ""
    });
  </script>
</body>
</html>
